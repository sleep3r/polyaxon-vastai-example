version: 1.1
kind: operation
matrix:
  kind: random
  concurrency: 2
  numRuns: 12
  params:
    lr:
      kind: logspace
      value: 0.0001:0.01:5
    hidden_size:
      kind: choice
      value: [64, 128, 256, 512]
    dropout:
      kind: choice
      value: [0.1, 0.2, 0.3, 0.5]
    batch_size:
      kind: choice
      value: [32, 64, 128]
  earlyStopping:
    - kind: metric_early_stopping
      metric: val_accuracy
      value: 0.99
      optimization: maximize

component:
  name: mnist-sweep
  tags: [mnist, pytorch, gpu, sweep]
  inputs:
    - name: lr
      type: float
    - name: hidden_size
      type: int
    - name: dropout
      type: float
    - name: batch_size
      type: int
    - name: epochs
      type: int
      isOptional: true
      value: 5
  run:
    kind: job
    connections: [default-artifacts-store]
    container:
      image: pytorch/pytorch:latest
      resources:
        limits:
          nvidia.com/gpu: 1
      workingDir: "/artifacts/{{ globals.uuid }}/uploads"
      command: ["bash", "-c"]
      args:
        - >
          pip install -q pyyaml polyaxon &&
          python -u train.py
          --epochs={{ epochs }}
          --lr={{ lr }}
          --hidden_size={{ hidden_size }}
          --dropout={{ dropout }}
          --batch_size={{ batch_size }}
