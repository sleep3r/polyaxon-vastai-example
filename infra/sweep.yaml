version: 1.1
kind: component
name: mnist-sweep
tags: [mnist, pytorch, gpu, sweep]

inputs:
  - name: epochs
    type: int
    isOptional: true
    value: 5

run:
  kind: job
  matrix:
    kind: random
    numRuns: 12
    concurrency: 2
    params:
      lr:
        kind: logspace
        value: [0.0001, 0.01, 5]
      hidden_size:
        kind: choice
        value: [64, 128, 256, 512]
      dropout:
        kind: choice
        value: [0.1, 0.2, 0.3, 0.5]
      batch_size:
        kind: choice
        value: [32, 64, 128]
  connections: [default-artifacts-store]
  container:
    image: pytorch/pytorch:latest
    resources:
      limits:
        nvidia.com/gpu: 1
    workingDir: "/artifacts/{{ globals.uuid }}/uploads"
    command: ["bash", "-c"]
    args:
      - >
        pip install -q pyyaml polyaxon &&
        python -u train.py
        --epochs={{ epochs }}
        --lr={{ lr }}
        --hidden_size={{ hidden_size }}
        --dropout={{ dropout }}
        --batch_size={{ batch_size }}
